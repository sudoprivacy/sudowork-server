version: "3.8"

services:
  # ============================================
  # Sudowork-Server Service
  # ============================================
  sudowork-server:
    image: 10.0.1.22:80/dev/sudoclaw-server:v1.0
    container_name: sudowork-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # 容器间通信配置（必须在 environment 中指定）
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
    volumes:
      # Persist SQLite database
      - ./data:/app/data
      # Mount .env for SMS and other configurations
      - ./.env:/app/.env:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sudowork-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ============================================
  # Redis Service
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: sudowork-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - sudowork-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

# ============================================
# Networks
# ============================================
networks:
  sudowork-network:
    driver: bridge
    name: sudowork-network

# ============================================
# Volumes
# ============================================
volumes:
  redis-data:
    driver: local
    name: sudowork-redis-data
